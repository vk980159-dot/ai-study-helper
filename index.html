<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Study Helper</title>

<style>

body{
font-family: Arial;
text-align:center;
background:#f5f5f5;
padding:40px;
}

textarea{
width:80%;
height:150px;
padding:10px;
font-size:16px;
}

button{
margin-top:20px;
padding:10px 20px;
font-size:16px;
cursor:pointer;
}

#output{
margin-top:30px;
background:white;
padding:20px;
border-radius:8px;
width:80%;
margin-left:auto;
margin-right:auto;
}

</style>
</head>

<body>

<h1>AI Study Helper</h1>

<textarea id="inputText" placeholder="Enter topic to explain..."></textarea>

<br>

<button onclick="generateNotes()">Generate Notes</button>

<div id="output"></div>

<script>

async function generateNotes(){

const text=document.getElementById("inputText").value;

document.getElementById("output").innerHTML="Generating...";

try{

const response=await fetch("/api/gemini",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({text:text})
});

const data=await response.json();

document.getElementById("output").innerHTML=data.result;

}catch(error){

document.getElementById("output").innerHTML="Error generating notes";

}

}

</script>

</body>
</html>
